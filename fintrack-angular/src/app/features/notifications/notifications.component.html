<!-- Header -->
<div class="page-header">
  <div>
    <h1>Notifications</h1>
    <p *ngIf="unreadCount > 0">{{ unreadCount }} unread</p>
    <p *ngIf="unreadCount === 0">All caught up!</p>
  </div>
  <div class="header-right header-actions">
    <button class="btn-ghost icon-btn" (click)="refresh()" title="Refresh">
      <app-icon name="refresh-cw" [size]="18"></app-icon>
      <span>Refresh</span>
    </button>
    <button class="btn-ghost" *ngIf="unreadCount > 0" (click)="markAllRead()">Mark all read</button>
  </div>
</div>

<!-- Selection toolbar -->
<div class="selection-toolbar" *ngIf="hasSelection && !loading">
  <button class="btn-ghost btn-sm" (click)="selectAllFiltered()">{{ allFilteredSelected ? 'Deselect all' : 'Select all' }}</button>
  <button class="btn-ghost btn-sm" (click)="bulkMarkRead()">Mark read</button>
  <button class="btn-ghost btn-sm danger" (click)="bulkDelete()">Delete</button>
  <span class="selection-count">{{ selectedIds.size }} selected</span>
</div>

<!-- Filter -->
<div class="filter-row">
  <button class="filter-chip" [class.active]="filterType === ''" (click)="filterType = ''">All</button>
  <button class="filter-chip" [class.active]="filterType === 'budget'"      (click)="filterType = 'budget'">Budget</button>
  <button class="filter-chip" [class.active]="filterType === 'savings'"     (click)="filterType = 'savings'">Savings</button>
  <button class="filter-chip" [class.active]="filterType === 'transaction'" (click)="filterType = 'transaction'">Transactions</button>
  <button class="filter-chip" [class.active]="filterType === 'alert'"       (click)="filterType = 'alert'">Alerts</button>
</div>

<!-- Loading -->
<div class="loading-list" *ngIf="loading">
  <div class="skeleton-row" *ngFor="let i of [1,2,3,4,5]"></div>
</div>

<!-- Empty -->
<div class="empty-state" *ngIf="!loading && filtered.length === 0">
  <div class="empty-icon"><app-icon name="bell" [size]="48"></app-icon></div>
  <h3>No notifications</h3>
  <p>You're all caught up!</p>
</div>

<!-- Notification List -->
<div class="notif-list" *ngIf="!loading && filtered.length > 0">
  <div class="notif-item"
       *ngFor="let n of filtered; trackBy: trackById"
       [class.unread]="!n.isRead"
       [class.selected]="isSelected(n.id)"
       (click)="markRead(n)">

    <div class="notif-checkbox" (click)="$event.stopPropagation()">
      <input type="checkbox" [checked]="isSelected(n.id)" (change)="toggleSelection(n.id)">
    </div>

    <div class="notif-icon" [class]="'notif-icon-' + getTypeClass(n.type)">
      <app-icon [name]="getIcon(n.type)" [size]="20"></app-icon>
    </div>

    <div class="notif-body">
      <div class="notif-title">{{ n.title }}</div>
      <div class="notif-message">{{ n.message }}</div>
      <div class="notif-time">{{ formatDate(n.createdAt) }}</div>
    </div>

    <div class="notif-right">
      <div class="unread-dot" *ngIf="!n.isRead"></div>
      <button class="btn-icon-sm delete" (click)="deleteNotif(n.id, $event)" title="Delete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

  </div>
</div>
