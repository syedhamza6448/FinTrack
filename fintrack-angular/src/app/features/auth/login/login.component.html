<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-mark">F</div>
      <span>Fin<em>Track</em></span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div class="auth-error" *ngIf="error">
      <lucide-angular name="alert-circle" [size]="14"></lucide-angular>
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-field">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <lucide-angular class="input-icon" name="mail" [size]="15"></lucide-angular>
          <input class="input input-with-icon" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <span class="form-error" *ngIf="email.touched && email.errors?.['required']">Email is required</span>
        <span class="form-error" *ngIf="email.touched && email.errors?.['email']">Enter a valid email</span>
      </div>

      <div class="form-field">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <lucide-angular class="input-icon" name="lock" [size]="15"></lucide-angular>
          <input class="input input-with-icon" [type]="showPw ? 'text' : 'password'" formControlName="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-pw" (click)="showPw = !showPw">
            <lucide-angular *ngIf="!showPw" name="eye" [size]="15"></lucide-angular>
            <lucide-angular *ngIf="showPw" name="eye-off" [size]="15"></lucide-angular>
          </button>
        </div>
        <span class="form-error" *ngIf="password.touched && password.errors?.['required']">Password is required</span>
      </div>

      <button class="btn-submit" type="submit" [disabled]="loading">
        <ng-container *ngIf="!loading; else signingIn">
          <lucide-angular name="arrow-right" [size]="16" class="me-2"></lucide-angular>
          <span>Sign In</span>
        </ng-container>
        <ng-template #signingIn>
          <lucide-angular name="loader-2" [size]="16" class="spin"></lucide-angular>
          <span>Signing in...</span>
        </ng-template>
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Create one</a>
    </p>

  </div>
</div>
