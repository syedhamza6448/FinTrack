<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-mark">F</div>
      <span>Fin<em>Track</em></span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div class="auth-error" *ngIf="error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-field">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="input" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <span class="form-error" *ngIf="email.touched && email.errors?.['required']">Email is required</span>
        <span class="form-error" *ngIf="email.touched && email.errors?.['email']">Enter a valid email</span>
      </div>

      <div class="form-field">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="input" [type]="showPw ? 'text' : 'password'" formControlName="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-pw" (click)="showPw = !showPw">
            <svg *ngIf="!showPw" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPw"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="form-error" *ngIf="password.touched && password.errors?.['required']">Password is required</span>
      </div>

      <button class="btn-submit" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Create one</a>
    </p>

  </div>
</div>
