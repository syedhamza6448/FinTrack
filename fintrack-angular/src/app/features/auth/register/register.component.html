<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-mark">F</div>
      <span>Fin<em>Track</em></span>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start managing your finances today</p>

    <div class="auth-error" *ngIf="error">
      <lucide-angular name="alert-circle" [size]="14"></lucide-angular>
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label">First Name</label>
          <div class="input-wrap">
            <lucide-angular class="input-icon" name="user" [size]="15"></lucide-angular>
            <input class="input input-with-icon" type="text" formControlName="firstName" placeholder="John">
          </div>
          <span class="form-error" *ngIf="firstName.touched && firstName.errors?.['required']">Required</span>
        </div>
        <div class="form-field">
          <label class="form-label">Last Name</label>
          <div class="input-wrap">
            <lucide-angular class="input-icon" name="user" [size]="15"></lucide-angular>
            <input class="input input-with-icon" type="text" formControlName="lastName" placeholder="Doe">
          </div>
          <span class="form-error" *ngIf="lastName.touched && lastName.errors?.['required']">Required</span>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <lucide-angular class="input-icon" name="mail" [size]="15"></lucide-angular>
          <input class="input input-with-icon" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <span class="form-error" *ngIf="email.touched && email.errors?.['required']">Email is required</span>
        <span class="form-error" *ngIf="email.touched && email.errors?.['email']">Enter a valid email</span>
      </div>

      <div class="form-field">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <lucide-angular class="input-icon" name="lock" [size]="15"></lucide-angular>
          <input class="input input-with-icon" [type]="showPw ? 'text' : 'password'" formControlName="password" placeholder="Min. 6 characters" autocomplete="new-password">
          <button type="button" class="toggle-pw" (click)="showPw = !showPw">
            <lucide-angular *ngIf="!showPw" name="eye" [size]="15"></lucide-angular>
            <lucide-angular *ngIf="showPw" name="eye-off" [size]="15"></lucide-angular>
          </button>
        </div>
        <span class="form-error" *ngIf="password.touched && password.errors?.['required']">Password is required</span>
        <span class="form-error" *ngIf="password.touched && password.errors?.['minlength']">At least 6 characters</span>
      </div>

      <div class="form-field">
        <label class="form-label">Currency</label>
        <div class="input-wrap">
          <lucide-angular class="input-icon" name="coins" [size]="15"></lucide-angular>
          <app-dropdown
            class="input input-with-icon"
            formControlName="currency"
            [options]="registerCurrencyOptions"
            placeholder="Currency">
          </app-dropdown>
        </div>
      </div>

      <button class="btn-submit" type="submit" [disabled]="loading">
        <ng-container *ngIf="!loading; else saving">
          <lucide-angular name="arrow-right" [size]="16" class="me-2"></lucide-angular>
          <span>Create Account</span>
        </ng-container>
        <ng-template #saving>
          <lucide-angular name="loader-2" [size]="16" class="spin"></lucide-angular>
          <span>Creating...</span>
        </ng-template>
      </button>

    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Sign in</a>
    </p>

  </div>
</div>
